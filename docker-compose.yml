services:
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    command: redis-server --maxmemory 256mb --maxmemory-policy noeviction --stop-writes-on-bgsave-error no --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    restart: unless-stopped
    networks:
      - default
      - internal
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  scraper-service:
    build: ./services/scraper-service
    ports:
      - "127.0.0.1:4001:4001"
    shm_size: "512mb"
    env_file:
      - path: generate-server/.env
        required: false
    environment:
      - PORT=4001
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  render-service:
    build: ./services/render-service
    ports:
      - "127.0.0.1:4002:4002"
    shm_size: "1gb"
    environment:
      - PORT=4002
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379
      - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
      - CHROME_CRASHPAD_DISABLE=1
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=1g,uid=1000,gid=1000
      - /app/.remotion-temp:size=1g,uid=1000,gid=1000
      - /app/public/renders:size=1g,uid=1000,gid=1000
      - /app/node_modules/.remotion:size=256m,uid=1000,gid=1000
      - /home/node:size=64m,uid=1000,gid=1000
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN
    networks:
      - default
      - internal
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Internal network blocks outbound internet for render-service
  # Redis and scraper-service use default bridge network
networks:
  internal:
    internal: true

volumes:
  redis-data:
